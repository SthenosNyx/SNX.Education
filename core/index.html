<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://i.ibb.co.com/DfCjtjDg/LOGO-HEADER.png">
    <title>S-Edu | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #000; 
            --primary-color: #5C5CFF; /* Biru terang untuk dark mode */
            --text-main: #fff; 
            --text-gray: #a0a0a0; 
            --border-color: rgba(255, 255, 255, 0.15);
        }
        [data-theme="light"] { 
            --bg-color: #f4f4f5; 
            --primary-color: #010066; /* Navy pekat untuk light mode */
            --text-main: #111; 
            --text-gray: #666; 
            --border-color: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); color: var(--text-main); 
            font-family: 'Montserrat', sans-serif; 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            overflow: hidden; transition: 0.4s; padding: 20px;
        }

        .logo-text { 
            font-size: 3.5rem; font-weight: 800; letter-spacing: 4px; 
            margin-bottom: 5px; text-transform: uppercase;
        }
        .sub-logo { 
            font-size: 0.85rem; font-weight: 600; letter-spacing: 6px; 
            color: var(--text-gray); margin-bottom: 30px; text-transform: uppercase;
        }

        .desc { 
            max-width: 650px; color: var(--text-gray); line-height: 1.8; 
            margin-bottom: 50px; font-size: 1rem;
        }
        /* Sorotan Teks Biru */
        .desc strong { color: var(--primary-color); font-weight: 700; }

        /* Style Tombol Masuk yang Diperbaiki */
        .btn-enter { 
            text-decoration: none; 
            color: var(--text-main); 
            font-weight: 700; 
            font-size: 1rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            padding: 16px 40px; 
            border: 1px solid var(--border-color); 
            border-radius: 50px; 
            background: transparent;
            transition: all 0.4s ease;
            position: relative;
        }

        /* Hover Glow Navy */
        .btn-enter:hover { 
            border-color: var(--primary-color); 
            background: rgba(1, 0, 102, 0.05); /* Transparan navy */
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(1, 0, 102, 0.2); /* Shadow navy */
            color: var(--primary-color);
        }

        @media (max-width: 600px) {
            .logo-text { font-size: 2.2rem; }
            .sub-logo { font-size: 0.6rem; letter-spacing: 4px; }
            .desc { font-size: 0.9rem; margin-bottom: 40px; }
        }

        /* Animasi Masuk */
        .fade-in { opacity: 0; animation: fadeIn 1s forwards cubic-bezier(0.2, 0.8, 0.2, 1); }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(20px); } }
    </style>
</head>
<body data-theme="dark">

    <div class="logo-text fade-in">S-NX EDUCATION</div>
    <div class="sub-logo fade-in delay-1">Ibnul Qayyim Islamic School</div>
    
    <p class="desc fade-in delay-2">
        Wadah praktis untuk mengakses <strong>tugas</strong>, <strong>materi</strong>, dan <strong>jadwal kelas</strong> dalam satu pintu. Dilengkapi fitur simpan tema otomatis dan arsip jadwal agar belajar lebih teratur.
    </p>

    <a href="tugas.html" class="btn-enter fade-in delay-3">Masuk</a>

    <script>
        // Deteksi tema yang disimpan sebelumnya
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.setAttribute('data-theme', 'light');
        } else {
            document.body.removeAttribute('data-theme');
        }
    </script>
</body>
</html>
