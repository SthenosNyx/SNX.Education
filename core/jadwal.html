</head>
<body>

  <nav class="snx-nav">
    <a href="tentang.html" class="logo">S-NX × EDU</a>
    <div class="nav-right">
      <ul class="nav-links" id="navList">
        <li><a href="tentang.html">Tentang</a></li>

        <li><a href="materi.html">Materi</a></li>
        <li><a href="jadwal.html" class="active">Jadwal</a></li>
      </ul>
      <button class="theme-btn" id="themeToggle">
        <span class="material-symbols-rounded" id="themeIcon" style="font-size:18px">dark_mode</span>
        <span id="themeText" class="btn-label">DARK</span>
      </button>
      <button class="menu-toggle" id="menuToggle" aria-label="Buka menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <div class="schedule-page">

    <div class="schedule-hero anim d1">
      <h1>Prediksi Jadwal & Agenda</h1>
      <p>Agenda yang telah terlampaui akan diarsip otomatis secara visual, ditandai dengan tampilan redup.</p>
    </div>

    <div class="month-label anim d2" id="monthLabel">— —</div>

    <div class="cal-wrap anim d3">
      <div class="cal-grid" id="calGrid">
        <!-- Day labels -->
        <div class="day-lbl">MGG</div>
        <div class="day-lbl">SEN</div>
        <div class="day-lbl">SEL</div>
        <div class="day-lbl">RAB</div>
        <div class="day-lbl">KAM</div>
        <div class="day-lbl">JUM</div>
        <div class="day-lbl">SAB</div>
      </div>
    </div>

    <p class="events-title anim d4">Agenda Mendatang</p>
    <div class="events-list anim d5" id="eventsList"></div>

  </div>

  <footer>
    <p>&copy; 2026 Sthenos Nyx. All Rights Reserved.</p>
  </footer>

  <script src="../assets/js/main.js"></script>
  <script>
    /* ── Inline data (mirrors ../data/jadwal-db.json) ── */
    const jadwalDB = [
      { id: 1, title: "Outing Class (Ikhwan)",      date: "2026-05-22" },
      { id: 2, title: "Outing Class (Akhwat)",       date: "2026-05-23" },
      { id: 3, title: "Ujian Akhir Semester 2",      date: "2026-06-08" },
      { id: 4, title: "Penerimaan Rapor Semester 2", date: "2026-06-22" },
      { id: 5, title: "Libur Akhir Tahun Ajaran",    date: "2026-06-25" }
    ];

    /* ── Calendar ── */
    function buildCalendar() {
      const now      = new Date();
      const year     = now.getFullYear();
      const month    = now.getMonth();   // 0-indexed
      const today    = now.getDate();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay   = new Date(year, month, 1).getDay(); // 0 = Sunday

      const MONTHS_ID = ["Januari","Februari","Maret","April","Mei","Juni",
                         "Juli","Agustus","September","Oktober","November","Desember"];

      document.getElementById('monthLabel').textContent =
        `${MONTHS_ID[month]} ${year}`;

      // Build event lookup map: "YYYY-MM-DD" → title
      const eventMap = {};
      jadwalDB.forEach(e => { eventMap[e.date] = e.title; });

      const grid = document.getElementById('calGrid');

      // Empty offset cells
      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        grid.appendChild(empty);
      }

      // Day cells
      for (let d = 1; d <= daysInMonth; d++) {
        const cell   = document.createElement('div');
        cell.className = 'day-cell';

        const mm  = String(month + 1).padStart(2, '0');
        const dd  = String(d).padStart(2, '0');
        const key = `${year}-${mm}-${dd}`;

        const num = document.createElement('span');
        num.className = 'day-num';
        num.textContent = d;
        cell.appendChild(num);

        if (d === today) cell.classList.add('today');
        if (d < today)   cell.classList.add('past');

        if (eventMap[key]) {
          cell.classList.add('has-event');
          const chip = document.createElement('p');
          chip.className = 'event-chip';
          chip.textContent = eventMap[key];
          cell.appendChild(chip);
        }

        grid.appendChild(cell);
      }
    }

    /* ── Events list ── */
    function buildEvents() {
      const list = document.getElementById('eventsList');
      const now  = new Date();

      list.innerHTML = jadwalDB.map(e => {
        const d    = new Date(e.date);
        const past = d < now;
        const fmt  = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        return `
          <div class="event-item${past ? ' past' : ''}">
            <span class="event-name">${e.title}</span>
            <span class="event-date">${fmt}</span>
          </div>
        `;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      buildCalendar();
      buildEvents();
    });
  </script>
</body>
</html>
