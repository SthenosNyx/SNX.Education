<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="https://i.ibb.co.com/DfCjtjDg/LOGO-HEADER.png">
  <title>S-Edu | Materi</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="../assets/css/global.css">
  <style>
    /* Subject card specifics */
    .subject-name {
      font-size: var(--t-xl);
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.15;
    }
    .card-desc {
      color: var(--muted);
      font-size: var(--t-xs);
      line-height: 1.65;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <nav class="snx-nav">
    <a href="tentang.html" class="logo">S-NX × EDU</a>
    <div class="nav-right">
      <ul class="nav-links" id="navList">
        <li><a href="tentang.html">Tentang</a></li>
        <li><a href="tugas.html">Tugas</a></li>
        <li><a href="materi.html" class="active">Materi</a></li>
        <li><a href="jadwal.html">Jadwal</a></li>
      </ul>
      <button class="theme-btn" id="themeToggle">
        <span class="material-symbols-rounded" id="themeIcon" style="font-size:18px">dark_mode</span>
        <span id="themeText" class="btn-label">DARK</span>
      </button>
      <button class="menu-toggle" id="menuToggle" aria-label="Buka menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <header class="hero anim d1">
    <h1>Arsip Materi Pembelajaran</h1>
    <p>Konten di halaman ini masih dalam tahap penyusunan dan mungkin belum lengkap sepenuhnya.</p>
    <span class="filter-label">Khusus Kelas 8A</span>
  </header>

  <div class="card-grid" id="materiGrid">
    <!-- Rendered by JS -->
  </div>

  <footer>
    <p>&copy; 2026 Sthenos Nyx. All Rights Reserved.</p>
  </footer>

  <script src="../assets/js/main.js"></script>
  <script>
    /* ── Inline data (mirrors ../data/materi-db.json) ── */
    const materiDB = [
      { id: "informatika",  name: "Informatika",              chapCount: 7,  desc: "Dasar berpikir komputasional, algoritma, dan pengenalan logika Python untuk Kelas 8." },
      { id: "pai",          name: "Pendidikan Agama Islam",   chapCount: 10, desc: "Kajian akhlak, fiqih, dan aqidah berdasarkan Al-Qur'an dan Hadits Shahih." },
      { id: "arab",         name: "Bahasa Arab",              chapCount: 5,  desc: "Penguatan kosakata, tata bahasa nahwu-sharaf, dan praktik percakapan sehari-hari." },
      { id: "matematika",   name: "Matematika",               chapCount: 9,  desc: "Aljabar lanjutan, persamaan kuadrat, dan geometri bidang untuk siswa Kelas 8." }
    ];

    function renderMateri() {
      const grid = document.getElementById('materiGrid');
      grid.innerHTML = materiDB.map((s, i) => `
        <div class="card anim d${Math.min(i + 2, 10)}">
          <div>
            <p class="subject-name">
              ${s.name}
              <span class="badge badge-accent">${s.chapCount} BAB</span>
            </p>
            <p class="card-desc">${s.desc}</p>
          </div>
          <a href="materi-lengkap.html?subject=${s.id}" class="btn-main">Materi Lengkap</a>
        </div>
      `).join('');

      CardGlow.init();
    }

    document.addEventListener('DOMContentLoaded', renderMateri);
  </script>
</body>
</html>
