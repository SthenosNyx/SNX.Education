<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | S-NX × EDU</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    .error-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin: 0;
    }
    .error-msg {
      font-size: 1.2rem;
      color: var(--text);
      opacity: 0.7;
    }
    .btn-back {
      margin-top: 20px;
      padding: 12px 24px;
      cursor: pointer;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="error-page">
    <h1 class="error-code">404</h1>
    <p class="error-msg">Halaman yang Anda cari tidak ditemukan.</p>
    <button class="btn-back" onclick="history.back()">Kembali ke Halaman Sebelumnya</button>
    <a href="index.html" style="margin-top: 10px; color: var(--accent);">Ke Beranda</a>
  </div>

</body>
</html>
